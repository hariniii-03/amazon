<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amazon Home</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>
  <header>
    <div class="logo">Amazon</div>
    <div class="search-bar">
      <input type="text" placeholder="Search Amazon">
    </div>
    <nav>
      <a href="#">Sign-In</a>
      <a href="#">Orders</a>
      <a href="#">Cart</a>
    </nav>
  </header>

  <main>
    <h2>Top Deals</h2>
    <div class="product-grid">
      <div class="product">
        <img src="https://via.placeholder.com/200" alt="Smartphone">
        <p>Smartphone</p>
        <p>₹15,999</p>
      </div>
      <div class="product">
        <img src="https://via.placeholder.com/200" alt="Laptop">
        <p>Laptop</p>
        <p>₹49,999</p>
      </div>
      <div class="product">
        <img src="https://via.placeholder.com/200" alt="Headphones">
        <p>Headphones</p>
        <p>₹1,999</p>
      </div>
      <div class="product">
        <img src="https://via.placeholder.com/200" alt="Smartwatch">
        <p>Smartwatch</p>
        <p>₹2,999</p>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2026 Amazon Clone Practice</p>
  </footer>
</body>
</html>
